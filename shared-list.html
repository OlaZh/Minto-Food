<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Список покупок</title>

    <script>
      (function () {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>

    <link rel="stylesheet" href="./css/main.css" />
  </head>

  <body class="page">
    <div class="app-bg">
      <div class="app-shell">
        <main class="shared-list-page">
          <div class="container">

            <div id="shared-loading" class="shared-list__loading">Завантаження...</div>

            <div id="shared-error" class="shared-list__error" hidden>
              Список не знайдено або посилання недійсне.
            </div>

            <div id="shared-content" hidden>
              <div class="shared-list__header">
                <h1 id="shared-title" class="shared-list__title"></h1>
                <span id="shared-count" class="shared-list__count"></span>
              </div>
              <div class="shared-list__progress-bar">
                <div id="shared-fill" class="shared-list__progress-fill"></div>
              </div>
              <span class="shared-list__sync-badge">Список оновлюється в реальному часі</span>
              <div id="shared-items"></div>
              <p class="shared-list__footer">Minto Food · Спільний список</p>
            </div>

          </div>
        </main>
      </div>
    </div>

    <script type="module" src="./js/shared-list.js"></script>
  </body>
</html>
