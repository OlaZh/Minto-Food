<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minto Food</title>

    <script>
      document.documentElement.classList.add('no-transition');

      (function () {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="page">
    <header class="header">
      <div class="header__container">
        <a href="index.html" class="header__logo" data-i18n="logo">Minto Food 🍃</a>

        <nav class="header__nav">
          <ul class="header__nav-list">
            <li>
              <a href="index.html" class="header__nav-link" data-i18n="navDayMenu">Меню на день</a>
            </li>
            <li>
              <a href="week-menu.html" class="header__nav-link" data-i18n="navWeekMenu"
                >Меню на тиждень</a
              >
            </li>
            <li>
              <a href="./recipes.html" class="header__nav-link" data-i18n="navRecipes">Рецепти</a>
            </li>
            <li>
              <a
                href="product-guide.html"
                class="header__nav-link header__nav-link--active"
                data-i18n="navShoppingList"
                >Путівник по продуктам</a
              >
            </li>
            <li>
              <a href="#" class="header__nav-link" data-i18n="navShoppingList">Список покупок</a>
            </li>
            <li>
              <a href="statistics.html" class="header__nav-link" data-i18n="navStats">Статистика</a>
            </li>
          </ul>
        </nav>

        <div class="header__actions">
          <button
            class="theme-toggle"
            type="button"
            aria-label="Змінити тему"
            data-i18n-aria="toggleTheme">
            <svg
              class="sun-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>

            <svg
              class="moon-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
        </div>

        <div class="header__right">
          <a href="#" id="headerAuthBtn" class="header__profile-name" data-i18n="login"> Увійти </a>

          <div class="lang-switcher">
            <select id="langSwitcher">
              <option value="ua">UA</option>
              <option value="pl">PL</option>
              <option value="en">EN</option>
            </select>
          </div>
        </div>
        <button class="header__burger" aria-label="Меню" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <div class="header__nav-overlay"></div>
    </header>
    <div class="app-bg">
      <div class="app-shell">
        <main class="main">
          <section class="product-guide">
            <!-- Заголовок -->
            <div class="column-header">
              <h1 class="column-header__title" data-i18n="productGuideTitle">
                Путівник по продуктах
              </h1>
            </div>

            <!-- Пошук -->
            <div class="product-search">
              <input
                type="text"
                class="product-search__input"
                placeholder="Введи продукт..."
                data-i18n-placeholder="searchPlaceholder" />
            </div>

            <!-- Фільтри -->
            <div class="product-filters">
              <button
                class="product-filters__item"
                data-filter="nutrition"
                data-i18n="filterNutrition">
                Харчова цінність
              </button>

              <button class="product-filters__item" data-filter="gi" data-i18n="filterGI">
                Глікемічний індекс
              </button>

              <button class="product-filters__item" data-filter="type" data-i18n="filterType">
                Тип продукту
              </button>

              <button class="product-filters__item" data-filter="purpose" data-i18n="filterPurpose">
                Призначення
              </button>

              <button
                class="product-filters__item"
                data-filter="restrictions"
                data-i18n="filterRestrictions">
                Обмеження
              </button>

              <button class="product-filters__item" data-filter="daytime" data-i18n="filterDaytime">
                Час доби
              </button>
            </div>
            <div class="product-subfilters">
              <!-- Харчова цінність -->
              <div class="subfilter-group" data-subfilter="nutrition">
                <button class="subfilter-item" data-i18n="subfilterNutritionHighProtein">
                  Високобілкові
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionLowCarb">
                  Низьковуглеводні
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionHighCarb">
                  Високовуглеводні
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionLowKcal">
                  Низькокалорійні
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionHighKcal">
                  Висококалорійні
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionBalanced">
                  Збалансовані
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionHighFat">
                  Високожирні
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionLowFat">
                  Низькожирні
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionFiber">
                  Багаті на клітковину
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionOmega3">
                  Багаті на Омега‑3
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionCalcium">
                  Багаті на кальцій
                </button>
                <button class="subfilter-item" data-i18n="subfilterNutritionIron">
                  Багаті на залізо
                </button>
              </div>

              <!-- Глікемічний індекс -->
              <div class="subfilter-group" data-subfilter="gi">
                <button class="subfilter-item" data-i18n="subfilterGILow">Низький ГІ</button>
                <button class="subfilter-item" data-i18n="subfilterGIMedium">Середній ГІ</button>
                <button class="subfilter-item" data-i18n="subfilterGIHigh">Високий ГІ</button>
                <button class="subfilter-item" data-i18n="subfilterGIUnknown">ГІ невідомий</button>
              </div>

              <!-- Тип продукту -->
              <div class="subfilter-group" data-subfilter="type">
                <button class="subfilter-item" data-i18n="subfilterTypeMeat">М’ясо</button>
                <button class="subfilter-item" data-i18n="subfilterTypePoultry">Птиця</button>
                <button class="subfilter-item" data-i18n="subfilterTypeFish">Риба</button>
                <button class="subfilter-item" data-i18n="subfilterTypeSeafood">
                  Морепродукти
                </button>
                <button class="subfilter-item" data-i18n="subfilterTypeOffal">Субпродукти</button>
                <button class="subfilter-item" data-i18n="subfilterTypeEggs">Яйця</button>
                <button class="subfilter-item" data-i18n="subfilterTypeDairy">Молочні</button>
                <button class="subfilter-item" data-i18n="subfilterTypePlantMilk">
                  Рослинне молоко
                </button>
                <button class="subfilter-item" data-i18n="subfilterTypeCheese">Сири</button>
                <button class="subfilter-item" data-i18n="subfilterTypeGrains">Крупи</button>
                <button class="subfilter-item" data-i18n="subfilterTypeLegumes">Бобові</button>
                <button class="subfilter-item" data-i18n="subfilterTypeFlour">Борошно</button>
                <button class="subfilter-item" data-i18n="subfilterTypeBread">Хліб</button>
                <button class="subfilter-item" data-i18n="subfilterTypeCrisps">Хлібці</button>
                <button class="subfilter-item" data-i18n="subfilterTypePasta">Макарони</button>
                <button class="subfilter-item" data-i18n="subfilterTypeVegetables">Овочі</button>
                <button class="subfilter-item" data-i18n="subfilterTypeMushrooms">Гриби</button>
                <button class="subfilter-item" data-i18n="subfilterTypeGreens">Зелень</button>
                <button class="subfilter-item" data-i18n="subfilterTypeFruits">Фрукти</button>
                <button class="subfilter-item" data-i18n="subfilterTypeBerries">Ягоди</button>
                <button class="subfilter-item" data-i18n="subfilterTypeNuts">Горіхи</button>
                <button class="subfilter-item" data-i18n="subfilterTypeSeeds">Насіння</button>
                <button class="subfilter-item" data-i18n="subfilterTypeSuperfoods">
                  Суперфуди
                </button>
                <button class="subfilter-item" data-i18n="subfilterTypeSweeteners">
                  Підсолоджувачі
                </button>
                <button class="subfilter-item" data-i18n="subfilterTypeSauces">Соуси</button>
                <button class="subfilter-item" data-i18n="subfilterTypeSpices">Спеції</button>
                <button class="subfilter-item" data-i18n="subfilterTypeFats">Жири</button>
                <button class="subfilter-item" data-i18n="subfilterTypeDrinks">Напої</button>
                <button class="subfilter-item" data-i18n="subfilterTypeSoda">Газовані напої</button>
                <button class="subfilter-item" data-i18n="subfilterTypeEnergy">Енергетики</button>
                <button class="subfilter-item" data-i18n="subfilterTypeCannedFish">
                  Консерви рибні
                </button>
                <button class="subfilter-item" data-i18n="subfilterTypeCannedVeg">
                  Консерви овочеві
                </button>
                <button class="subfilter-item" data-i18n="subfilterTypeCannedFruit">
                  Консерви фруктові
                </button>
                <button class="subfilter-item" data-i18n="subfilterTypeCannedSoup">
                  Консервовані супи
                </button>
                <button class="subfilter-item" data-i18n="subfilterTypeSemiFinished">
                  Напівфабрикати
                </button>
                <button class="subfilter-item" data-i18n="subfilterTypeVeganProtein">
                  Веганські білки
                </button>
              </div>

              <!-- Призначення -->
              <div class="subfilter-group" data-subfilter="purpose">
                <button class="subfilter-item" data-i18n="subfilterPurposeWeightLoss">
                  Для схуднення
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeWeightGain">
                  Для набору ваги
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeSport">
                  Для спортсменів
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeVegan">
                  Для веганів
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeDiabetic">
                  Для діабетиків
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeKids">Для дітей</button>
                <button class="subfilter-item" data-i18n="subfilterPurposeSnack">
                  Для перекусу
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeBreakfast">
                  Для сніданку
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeLunch">Для обіду</button>
                <button class="subfilter-item" data-i18n="subfilterPurposeDinner">
                  Для вечері
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeBaking">
                  Для випічки
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeSalads">
                  Для салатів
                </button>
                <button class="subfilter-item" data-i18n="subfilterPurposeSoups">Для супів</button>
                <button class="subfilter-item" data-i18n="subfilterPurposePasta">Для пасти</button>
                <button class="subfilter-item" data-i18n="subfilterPurposeSandwich">
                  Для сендвічів
                </button>
              </div>

              <!-- Обмеження -->
              <div class="subfilter-group" data-subfilter="restrictions">
                <button class="subfilter-item" data-i18n="subfilterRestrictionsLactoseFree">
                  Безлактозні
                </button>
                <button class="subfilter-item" data-i18n="subfilterRestrictionsGlutenFree">
                  Безглютенові
                </button>
                <button class="subfilter-item" data-i18n="subfilterRestrictionsSugarFree">
                  Безцукрові
                </button>
                <button class="subfilter-item" data-i18n="subfilterRestrictionsEggFree">
                  Без яєць
                </button>
                <button class="subfilter-item" data-i18n="subfilterRestrictionsNutFree">
                  Без горіхів
                </button>
                <button class="subfilter-item" data-i18n="subfilterRestrictionsVegan">
                  Веганські
                </button>
                <button class="subfilter-item" data-i18n="subfilterRestrictionsVegetarian">
                  Вегетаріанські
                </button>
                <button class="subfilter-item" data-i18n="subfilterRestrictionsLowFodmap">
                  Low‑FODMAP
                </button>
                <button class="subfilter-item" data-i18n="subfilterRestrictionsHalal">Halal</button>
                <button class="subfilter-item" data-i18n="subfilterRestrictionsKosher">
                  Kosher
                </button>
              </div>

              <!-- Час доби -->
              <div class="subfilter-group" data-subfilter="daytime">
                <button class="subfilter-item" data-i18n="subfilterDaytimeBreakfast">
                  Сніданок
                </button>
                <button class="subfilter-item" data-i18n="subfilterDaytimeLunch">Обід</button>
                <button class="subfilter-item" data-i18n="subfilterDaytimeDinner">Вечеря</button>
                <button class="subfilter-item" data-i18n="subfilterDaytimeSnack">Перекус</button>
              </div>
            </div>

            <!-- Сітка продуктів -->
            <div class="product-grid">
              <!-- Міні-картка продукту -->
              <div class="product-grid">
                <div class="product-list" id="productList"></div>
              </div>
              <!-- Далі будуть інші продукти... -->
            </div>
          </section>
        </main>
      </div>
    </div>

    <div class="modal" data-modal="product" hidden>
      <div class="modal__overlay" data-modal-close></div>

      <div class="modal__content product-modal">
        <!-- HEADER -->
        <!-- HEADER -->
        <div class="modal__header">
          <h2 class="modal__title" data-i18n="productName"></h2>
          <button class="modal__close" data-modal-close>&times;</button>
        </div>

        <!-- BODY -->
        <div class="modal__body product-modal__body">
          <!-- Фото -->
          <div class="product-modal__image-wrapper">
            <img src="img/placeholder.jpg" alt="" class="product-modal__image" />
          </div>

          <!-- Опис -->
          <p class="product-modal__description" data-i18n="productShortDesc"></p>

          <!-- КБЖУ -->
          <div class="product-modal__macros">
            <span class="macro" data-i18n="kcal"></span>
            <span class="macro" data-i18n="protein"></span>
            <span class="macro" data-i18n="fat"></span>
            <span class="macro" data-i18n="carbs"></span>
          </div>

          <!-- Теги -->
          <div class="product-modal__tags"></div>

          <!-- Акордеони -->
          <div class="product-modal__accordion">
            <!-- Користь -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="benefits">Користь</button>
              <div class="accordion__content">
                <ul class="accordion__list"></ul>
              </div>
            </div>

            <!-- Шкода -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="harm">Шкода / обмеження</button>
              <div class="accordion__content">
                <ul class="accordion__list"></ul>
              </div>
            </div>

            <!-- Коли краще їсти -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="whenToEat">Коли краще їсти</button>
              <div class="accordion__content">
                <ul class="accordion__list"></ul>
              </div>
            </div>

            <!-- Коли не варто -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="whenNotToEat">Коли не варто</button>
              <div class="accordion__content">
                <ul class="accordion__list"></ul>
              </div>
            </div>

            <!-- Поєднання -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="combinations">Поєднання</button>
              <div class="accordion__content">
                <h4 class="accordion__subtitle" data-i18n="goodComb">Добре поєднується</h4>
                <ul class="accordion__list"></ul>

                <h4 class="accordion__subtitle" data-i18n="badComb">Погано поєднується</h4>
                <ul class="accordion__list"></ul>
              </div>
            </div>

            <!-- Що відбувається з тілом -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="bodyReaction">
                Що відбувається з тілом
              </button>
              <div class="accordion__content">
                <ul class="accordion__list"></ul>
              </div>
            </div>

            <!-- Міфи -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="myths">Міфи та правда</button>
              <div class="accordion__content">
                <ul class="accordion__list"></ul>
              </div>
            </div>

            <!-- Рецепти -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="recipes">Рецепти</button>
              <div class="accordion__content">
                <div class="recipes-container"></div>
              </div>
            </div>

            <!-- Заміни -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="substitutes">Заміни</button>
              <div class="accordion__content">
                <div class="substitutes-container"></div>
              </div>
            </div>

            <!-- Схожі продукти -->
            <div class="accordion">
              <button class="accordion__toggle" data-i18n="similarProducts">Схожі продукти</button>
              <div class="accordion__content">
                <div class="similar-products-container"></div>
              </div>
            </div>
          </div>
        </div>
        <!-- FOOTER (опційно) -->
        <div class="modal__footer">
          <button class="modal__confirm" data-i18n="close" data-modal-close>Закрити</button>
        </div>
      </div>
    </div>

    <!---------------СКРИПТИ--------------- -->
        <script type="module" src="js/product-guide.js"></script>
    <script src="js/theme-toggle.js"></script>
    <script src="js/mobile-nav.js"></script>
  </body>
</html>
