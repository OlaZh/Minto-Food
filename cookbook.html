<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Книга рецептів</title>

    <script>
      (function () {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <link rel="stylesheet" href="./css/main.css" />
  </head>

  <body class="page">
    <header class="header">
      <div class="header__container">
        <a href="index.html" class="header__logo"
          ><img src="img/logo.svg" alt="Logo" data-i18n="logo"
        /></a>

        <nav class="header__nav">
          <ul class="header__nav-list">
            <li>
              <a href="index.html" class="header__nav-link" data-i18n="navDayMenu">Меню на день</a>
            </li>
            <li>
              <a href="week-menu.html" class="header__nav-link" data-i18n="navWeekMenu"
                >Меню на тиждень</a
              >
            </li>
            <li>
              <a href="./recipes.html" class="header__nav-link" data-i18n="navRecipes">Рецепти</a>
            </li>
            <li>
              <a href="product-guide.html" class="header__nav-link" data-i18n="navProductGuide"
                >Путівник по продуктам</a
              >
            </li>
            <li>
              <a href="shopping-list.html" class="header__nav-link" data-i18n="navShoppingList">Список покупок</a>
            </li>
            <li>
              <a
                href="cookbook.html"
                class="header__nav-link header__nav-link--active"
                data-i18n="navCookbook"
                >Книга рецептів</a
              >
            </li>
          </ul>
        </nav>

        <div class="header__actions">
          <button
            class="theme-toggle"
            type="button"
            aria-label="Змінити тему"
            data-i18n-aria="toggleTheme">
            <svg
              class="sun-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg
              class="moon-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>

          <a href="profile.html" class="header__profile" aria-label="Профіль">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </a>
        </div>
        <button class="header__burger" aria-label="Меню" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <div class="header__nav-overlay"></div>
    </header>

    <main>
      <div class="container">
        <div class="cookbook-page">

          <div class="cookbook-page__header">
            <h1 class="cookbook-page__title">Книга рецептів</h1>
            <button class="cookbook-page__add-btn cookbook-page__add-btn--mobile js-add-book-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Нова книга
            </button>
          </div>

          <div class="cookbook-layout">
            <section class="cookbook-main">
              <div class="cookbook-books__grid" id="booksGrid"></div>
            </section>

            <aside class="cookbook-sidebar">
              <button class="cookbook-page__add-btn cookbook-page__add-btn--sidebar js-add-book-btn" id="addBookBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Нова книга
              </button>
              <h2 class="cookbook-sidebar__title">Нещодавно переглянуті</h2>
              <div class="cookbook-recent" id="recentRecipes"></div>
            </aside>
          </div>

        </div>
      </div>
    </main>

    <!-- Модалка: Відкрита книга -->
    <div class="modal-overlay" id="bookModal">
      <div class="cookbook-modal">
        <button class="modal__close" id="closeBookModal" aria-label="Закрити">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <div class="cookbook-modal__header">
          <h2 class="cookbook-modal__title" id="bookModalTitle">Назва книги</h2>
        </div>

        <div class="cookbook-modal__content cookbook-modal__content--active">
          <div class="cookbook-recipes" id="bookRecipes">
            <p class="cookbook-recipes__empty">Тут поки немає рецептів. Додай їх зі сторінки "Рецепти"!</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Модалка: Створити нову книгу -->
    <div class="modal-overlay" id="newBookModal">
      <div class="cookbook-modal cookbook-modal--small">
        <button class="modal__close" id="closeNewBookModal" aria-label="Закрити">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <h2 class="cookbook-modal__title">Нова книга</h2>

        <form class="cookbook-form" id="newBookForm">
          <div class="cookbook-form__field">
            <label for="newBookName">Назва книги</label>
            <input
              type="text"
              id="newBookName"
              placeholder="Наприклад: Обіди на роботу"
              required
              maxlength="50" />
          </div>

          <div class="cookbook-form__field">
            <label for="newBookIcon">Іконка</label>
            <div class="cookbook-form__icons" id="iconPicker">
              <!-- populated by JS -->
            </div>
          </div>

          <button type="submit" class="cookbook-form__submit">Створити книгу</button>
        </form>
      </div>
    </div>

    <!-- Модалка: Нова нотатка -->
    <div class="modal-overlay" id="newNoteModal">
      <div class="cookbook-modal cookbook-modal--small">
        <button class="modal__close" id="closeNewNoteModal" aria-label="Закрити">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>

        <h2 class="cookbook-modal__title">Нова нотатка</h2>

        <form class="cookbook-form" id="newNoteForm">
          <div class="cookbook-form__field">
            <label for="noteTitle">Назва нотатки</label>
            <input
              type="text"
              id="noteTitle"
              placeholder="Наприклад: Що брала на роботу"
              required
              maxlength="100" />
          </div>

          <div class="cookbook-form__field">
            <label for="noteContent">Текст</label>
            <textarea id="noteContent" rows="6" placeholder="Пиши тут..."></textarea>
          </div>

          <button type="submit" class="cookbook-form__submit">Зберегти</button>
        </form>
      </div>
    </div>

    <script type="module" src="./js/theme-toggle.js"></script>
    <script type="module" src="./js/cookbook.js"></script>
    <script src="js/mobile-nav.js"></script>
    <script src="js/mobile-tab-bar.js"></script>
  </body>
</html>
